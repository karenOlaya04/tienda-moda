<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-size: 18px;
}

/* ENCABEZADO */
header {
    display: flex;
    align-items: center;
    padding: 15px 30px;
}

.logo {
    width: 90px;
}

nav {
    flex: 1;
    text-align: center;
}

nav a {
    margin: 0 30px;
    text-decoration: none;
    color: #c71585;
    font-weight: bold;
    font-size: 20px;
}

/* ESPACIO */
.espacio {
    height: 30px;
}

/* FRANJA */
.franja {
    width: 100%;
    background-color: #c71585;
    padding: 18px 0;
    text-align: center;
}

.franja h1 {
    color: white;
    margin: 0;
    font-size: 30px;
}

/* REDES */
.redes {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 60px;
    gap: 50px;
}

.red {
    display: flex;
    align-items: center;
    gap: 10px;
}

.red img {
    width: 40px;
}

.red span {
    color: #c71585;
    font-size: 22px;
    font-weight: bold;
}

/* IMAGEN GRANDE */
.imagen {
    text-align: center;
    margin-top: 60px;
}

.imagen img {
    width: 95%;          /* MUY GRANDE */
    max-width: 1200px;   /* límite grande */
    height: auto;
    border-radius: 10px;
}

/* FORMULARIO */
.formulario {
    width: 40%;
    margin: 50px auto;
    padding: 25px;
    border: 1px solid #ddd;
    border-radius: 10px;
}

.formulario label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

.formulario input,
.formulario textarea {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* BOTÓN */
.boton {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    background-color: #c71585;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    cursor: pointer;
}

.boton:hover {
    opacity: 0.8;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">

    <nav>
        <a href="index.html">Inicio</a>
        <a href="catalogos.html">Catálogos</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<div class="espacio"></div>

<div class="franja">
    <h1>Contacto</h1>
</div>

<div class="espacio"></div>

<!-- REDES -->
<div class="redes">

    <div class="red">
        <img src="whatsapp.png">
        <span>+57 315 7126274</span>
    </div>

    <div class="red">
        <img src="facebook.png">
        <span>MODA STYLE ELITE</span>
    </div>

    <div class="red">
        <img src="instagram.png">
        <span>@moda_style.elite</span>
    </div>

</div>

<!-- IMAGEN GRANDE -->
<div class="imagen">
    <img src="contacto.jpg" alt="Contacto">
</div>

<!-- FORMULARIO -->
<div class="formulario">
    <form id="formulario">

        <label>Nombre</label>
        <input type="text" required>

        <label>Correo</label>
        <input type="email" required>

        <label>Número de celular</label>
        <input type="tel" required>

        <label>Mensaje</label>
        <textarea rows="4" required></textarea>

        <button type="submit" class="boton">Enviar</button>

    </form>
</div>

<script>
document.getElementById("formulario").addEventListener("submit", function(e){
    e.preventDefault();
    this.reset();
    alert("Formulario enviado correctamente");
});
</script>

</body>
</html>
