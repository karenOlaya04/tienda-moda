<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogos</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-size: 18px;
}

/* ENCABEZADO */
header {
    display: flex;
    align-items: center;
    padding: 15px 30px;
}

.logo {
    width: 90px;
}

nav {
    flex: 1;
    text-align: center;
}

nav a {
    margin: 0 30px;
    text-decoration: none;
    color: #c71585;
    font-weight: bold;
    font-size: 20px;
}

/* ESPACIO */
.espacio {
    height: 30px;
}

/* FRANJA */
.franja {
    width: 100%;
    background-color: #c71585;
    padding: 18px 0;
    text-align: center;
}

.franja h1 {
    color: white;
    margin: 0;
    font-size: 30px;
}

/* GRID */
.catalogos {
    width: 80%;
    margin: 50px auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
    justify-items: center;
}

/* IMÁGENES */
.catalogo img {
    width: 100%;
    max-width: 300px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.3s;
}

.catalogo img:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">

    <nav>
        <a href="index.html">Inicio</a>
        <a href="catalogos.html">Catálogos</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<div class="espacio"></div>

<div class="franja">
    <h1>Catálogos</h1>
</div>

<div class="espacio"></div>

<!-- CATÁLOGOS CON IMÁGENES -->
<div class="catalogos">

    <div class="catalogo">
        <a href="catalogo1.pdf" target="_blank">
            <img src="portada1.jpg" alt="Catálogo 1">
        </a>
    </div>

    <div class="catalogo">
        <a href="catalogo2.pdf" target="_blank">
            <img src="portada2.jpg" alt="Catálogo 2">
        </a>
    </div>

    <div class="catalogo">
        <a href="catalogo3.pdf" target="_blank">
            <img src="portada3.jpg" alt="Catálogo 3">
        </a>
    </div>

    <div class="catalogo">
        <a href="catalogo4.pdf" target="_blank">
            <img src="portada4.jpg" alt="Catálogo 4">
        </a>
    </div>

</div>

</body>
</html>
